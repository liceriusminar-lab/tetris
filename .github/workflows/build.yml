name: Build Tetris Linux

on:
  push:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt and dependencies
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-base-private-dev \
                             qt6-tools-dev cmake g++ \
                             libgl1-mesa-dev libglib2.0-0 \
                             libxkbcommon-x11-0 libxcb-icccm4 \
                             libxcb-image0 libxcb-keysyms1 \
                             libxcb-randr0 libxcb-render-util0 \
                             libxcb-xinerama0 libxcb-xfixes0 \
                             libdbus-1-3 wget

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        run: |
          export QMAKE=$(which qmake6 || which qmake)
          export OUTPUT=Tetris-Linux.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/Tetris \
            --desktop-file tetris.desktop \
            --icon-file tetris.png \
            --plugin qt \
            --output appimage

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Tetris v${{ github.run_number }}"
          body: |
            ## 🐧 Linux
            1. Скачай `Tetris-Linux.AppImage`
            2. Запусти:
```bash
            chmod +x Tetris-Linux.AppImage
            ./Tetris-Linux.AppImage
```
          files: Tetris-Linux.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
