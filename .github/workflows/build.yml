cat > /home/licerius/Desktop/PG/Tetris/.github/workflows/build.yml << 'EOF'
name: Build Tetris

on:
  push:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt and dependencies
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-base-private-dev \
                             qt6-tools-dev cmake g++ \
                             libgl1-mesa-dev libglib2.0-0 \
                             libxkbcommon-x11-0 libxcb-icccm4 \
                             libxcb-image0 libxcb-keysyms1 \
                             libxcb-randr0 libxcb-render-util0 \
                             libxcb-xinerama0 libxcb-xfixes0 \
                             libdbus-1-3 wget

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        run: |
          export QMAKE=$(which qmake6 || which qmake)
          export OUTPUT=Tetris-Linux.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/Tetris \
            --desktop-file tetris.desktop \
            --icon-file tetris.png \
            --plugin qt \
            --output appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Linux
          path: Tetris-Linux.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Install MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Deploy Qt
        shell: cmd
        run: |
          mkdir release
          copy build\Tetris.exe release\
          windeployqt --release --no-translations release\Tetris.exe

      - name: Zip
        shell: powershell
        run: Compress-Archive -Path release\* -DestinationPath Tetris-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Windows
          path: Tetris-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'mac'
          target: 'desktop'

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Deploy
        run: |
          cd build
          macdeployqt Tetris.app -dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-macOS
          path: build/Tetris.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Tetris v${{ github.run_number }}
          body: "Linux: chmod +x Tetris-Linux.AppImage && ./Tetris-Linux.AppImage | Windows: распакуй zip и запусти Tetris.exe | macOS: открой dmg и перетащи в Applications"
          files: |
            artifacts/Tetris-Linux/Tetris-Linux.AppImage
            artifacts/Tetris-Windows/Tetris-Windows.zip
            artifacts/Tetris-macOS/Tetris.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
EOF
